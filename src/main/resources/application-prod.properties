# Production profile
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081}
spring.data.mongodb.uri=mongodb://admin:password@mongodb:27017/gamedb?authSource=admin
spring.mongodb.uri=mongodb://admin:password@mongodb:27017/gamedb?authSource=admin
spring.data.mongodb.database=gamedb
logging.level.kev.gamedb=INFO

# Optimize for low-RAM VPS (1GB)
# Disable target auto-index creation to prevent startup crashes
spring.data.mongodb.auto-index-creation=false

# Increase connection stability
spring.data.mongodb.connect-timeout=10000
spring.data.mongodb.socket-timeout=10000
