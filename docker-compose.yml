services:
  mongodb:
    image: mongo:latest
    container_name: gamedb-atlas
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-password}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamedb-backend
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_CONNECTION_STRING: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password}@mongodb:27017/gamedb?authSource=admin"
      SPRING_DATA_MONGODB_URI: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password}@mongodb:27017/gamedb?authSource=admin"
      SPRING_MONGODB_URI: "mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-password}@mongodb:27017/gamedb?authSource=admin"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8081,http://127.0.0.1:8081,http://34.41.26.216,http://questlog.kfranklyn.dev,https://questlog.kfranklyn.dev}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-584a0a20d65af30d8825a3865fb668646df9d32b504956bb4f3b9400e45c7d93a766282}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamedb-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gamedb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
